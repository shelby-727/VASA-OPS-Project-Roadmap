<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VASA Operations Timeline</title>
<style>
:root{
  --navy:#1F2A44;
  --navy-light:#2C3B5E;
  --bg:#F3F4F7;
  --card:#FFFFFF;
  --line:#E3E5EA;
  --text:#1C2333;
  --muted:#6B7280;
  --today:#FFE8CC;
  --today-line:#E8833A;
  --radius:10px;
  --mono:'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter','Space Grotesk',system-ui,-apple-system,sans-serif;
  font-size:14px;
  line-height:1.4;
}
.app{
  max-width:1400px;
  margin:0 auto;
  padding:20px 24px 60px;
}

/* ---------- Header ---------- */
.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:20px;
  margin-bottom:18px;
  flex-wrap:wrap;
}
.header h1{
  font-family:'Space Grotesk','Inter',sans-serif;
  font-size:26px;
  font-weight:700;
  margin:0 0 4px 0;
  color:var(--navy);
  letter-spacing:-0.01em;
}
.header .sub{
  color:var(--muted);
  font-size:13px;
}
.view-toggle{
  display:flex;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:999px;
  padding:3px;
  gap:2px;
  height:38px;
  align-self:flex-start;
}
.view-toggle button{
  border:none;
  background:transparent;
  padding:0 18px;
  height:32px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  font-family:inherit;
  transition:background .15s, color .15s;
}
.view-toggle button.active{
  background:var(--navy);
  color:#fff;
}

/* ---------- Filter bar ---------- */
.filterbar{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:18px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.filter-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.filter-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--muted);
  width:88px;
  flex-shrink:0;
}
.pill{
  border:1px solid var(--line);
  background:#fff;
  padding:6px 13px;
  border-radius:999px;
  font-size:12.5px;
  font-weight:600;
  cursor:pointer;
  color:var(--text);
  font-family:inherit;
  transition:all .12s;
  white-space:nowrap;
}
.pill:hover{border-color:#c3c8d4;}
.pill.active{
  background:var(--navy);
  border-color:var(--navy);
  color:#fff;
}
.chip{
  border:1px solid var(--line);
  background:#fff;
  padding:5px 12px 5px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:var(--text);
  font-family:inherit;
  opacity:1;
  transition:all .12s;
}
.chip .dot{
  width:9px;height:9px;border-radius:50%;flex-shrink:0;
}
.chip.off{
  opacity:.4;
  background:#fafafb;
}
.chip:hover{border-color:#c3c8d4;}
.filter-actions{
  margin-left:auto;
  display:flex;
  gap:8px;
}
.linklike{
  background:none;border:none;color:var(--navy-light);font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;padding:4px 2px;
}
.linklike:hover{text-decoration:underline;}

/* ---------- Gantt ---------- */
.gantt-wrap{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}
.gantt-scroll{
  overflow-x:auto;
}
.gantt-grid{
  min-width:960px;
}
.gantt-head{
  display:grid;
  grid-template-columns:280px repeat(7,1fr);
  position:sticky;
  top:0;
  background:var(--navy);
  color:#fff;
  z-index:5;
}
.gantt-head .hcell{
  padding:10px 12px;
  font-size:11.5px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
  border-right:1px solid rgba(255,255,255,.08);
  text-align:center;
}
.gantt-head .hcell:first-child{
  text-align:left;
  text-transform:none;
  font-size:12px;
  letter-spacing:0;
}
.gantt-head .hcell.current{
  background:var(--today-line);
}
.cat-group-header{
  display:grid;
  grid-template-columns:280px repeat(7,1fr);
  background:#F7F8FA;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  cursor:pointer;
  user-select:none;
}
.cat-group-header .catcell{
  padding:8px 12px;
  font-size:12.5px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}
.cat-group-header .catdot{
  width:10px;height:10px;border-radius:3px;flex-shrink:0;
}
.cat-group-header .count{
  color:var(--muted);
  font-weight:500;
  font-size:11.5px;
}
.cat-group-header .chev{
  margin-left:auto;
  margin-right:12px;
  color:var(--muted);
  font-size:11px;
  transition:transform .15s;
}
.cat-group-header.collapsed .chev{transform:rotate(-90deg);}
.gantt-row{
  display:grid;
  grid-template-columns:280px repeat(7,1fr);
  border-top:1px solid #F0F1F3;
  min-height:36px;
}
.gantt-row:hover{background:#FAFBFD;}
.gantt-row .label{
  padding:7px 12px 7px 26px;
  font-size:12.5px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:1px;
  border-right:1px solid var(--line);
  cursor:pointer;
}
.gantt-row .label .name{
  font-weight:600;
  color:var(--text);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.gantt-row .label .meta{
  font-size:10.5px;
  color:var(--muted);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.gantt-track{
  position:relative;
  grid-column:2 / span 7;
  display:grid;
  grid-template-columns:repeat(7,1fr);
}
.gantt-track .monthcell{
  border-right:1px solid #F0F1F3;
}
.gantt-track .monthcell.current{
  background:rgba(232,131,58,.10);
}
.bar{
  position:absolute;
  top:6px;
  bottom:6px;
  min-width:8px;
  border-radius:6px;
  cursor:pointer;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);
}
.bar.needsdate{
  background-image: repeating-linear-gradient(45deg, var(--bc) 0 6px, #FFE066 6px 12px);
}
.bar.monitoring{
  background:repeating-linear-gradient(45deg,#C7CAD1 0 6px, #E4E6EA 6px 12px);
  box-shadow:inset 0 0 0 1px #B9BDC6;
}
.bar:hover{outline:2px solid var(--navy); outline-offset:1px;}

.gantt-empty{
  padding:40px;
  text-align:center;
  color:var(--muted);
}

/* ---------- Calendar ---------- */
.month-tabs{
  display:flex;
  gap:4px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.month-tabs button{
  border:1px solid var(--line);
  background:#fff;
  padding:8px 16px;
  border-radius:8px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  color:var(--text);
  font-family:inherit;
}
.month-tabs button.active{
  background:var(--navy);
  border-color:var(--navy);
  color:#fff;
}
.month-tabs button.hascurrent::after{
  content:'';
  display:inline-block;
  width:6px;height:6px;border-radius:50%;
  background:var(--today-line);
  margin-left:6px;
  vertical-align:middle;
}
.cal-layout{
  display:grid;
  grid-template-columns:1fr 300px;
  gap:16px;
  align-items:start;
}
.cal-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}
.cal-weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  background:var(--navy);
}
.cal-weekdays div{
  color:#fff;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
  padding:8px 0;
  text-align:center;
}
.cal-grid{
  display:flex;
  flex-direction:column;
}
.cal-week{
  position:relative;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  border-bottom:1px solid #F0F1F3;
}
.cal-cell{
  border-right:1px solid #F0F1F3;
  padding:4px 4px 0;
  position:relative;
}
.cal-cell.pad{background:#FAFAFB;}
.cal-cell.today{background:var(--today);}
.cal-cell .daynum{
  font-size:11.5px;
  font-weight:700;
  color:var(--muted);
}
.cal-cell.today .daynum{color:var(--today-line);}
.bar-layer{
  position:absolute;
  left:0; right:0; top:0; bottom:0;
  pointer-events:none;
}
.evt-bar{
  position:absolute;
  height:18px;
  border-radius:4px;
  font-size:10.5px;
  font-weight:600;
  color:#fff;
  display:flex;
  align-items:center;
  padding:0 6px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  cursor:pointer;
  pointer-events:auto;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);
}
.evt-bar:hover{outline:2px solid var(--navy); outline-offset:1px; z-index:2;}
.evt-bar.needsdate{
  background-image: repeating-linear-gradient(45deg, var(--bc) 0 5px, #FFE066 5px 10px);
  color:#3a2e00;
}
.evt-overflow{
  position:absolute;
  left:4px; right:4px;
  height:14px;
  font-size:10px;
  font-weight:700;
  color:var(--muted);
  pointer-events:auto;
  cursor:default;
}
.evt-bar.monitoring2, .bar.monitoring{
  background:repeating-linear-gradient(45deg,#C7CAD1 0 6px, #E4E6EA 6px 12px);
  box-shadow:inset 0 0 0 1px #B9BDC6;
  color:#555;
}

/* ---------- Dates tab ---------- */
.dates-wrap{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}
.dates-toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--line);
}
.dates-count{
  font-size:12.5px;
  color:var(--muted);
}
.dates-scroll{
  overflow-x:auto;
  max-height:70vh;
  overflow-y:auto;
}
.dates-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
.dates-table thead th{
  position:sticky;
  top:0;
  background:var(--navy);
  color:#fff;
  text-align:left;
  padding:9px 12px;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
  z-index:2;
}
.dates-table tbody tr{
  border-top:1px solid #F0F1F3;
  transition:background .8s;
}
.dates-table tbody tr:hover{background:#FAFBFD;}
.dates-table tbody tr.flash{background:#FFF3D6;}
.dates-table td{
  padding:8px 12px;
  vertical-align:middle;
}
.tdot{
  display:inline-block;
  width:9px;height:9px;border-radius:50%;
}
.tdname{font-weight:600; color:var(--text);}
.tdmeta{font-size:11px; color:var(--muted); margin-top:1px;}
.dateinput{
  border:1px solid var(--line);
  border-radius:6px;
  padding:5px 8px;
  font-size:12.5px;
  font-family:inherit;
  color:var(--text);
  background:#fff;
}
.dateinput:focus{outline:2px solid var(--navy); outline-offset:1px;}
.statuspill{
  display:inline-block;
  padding:3px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}
.status-scheduled{background:#E4F3E8; color:#22743A;}
.status-needsdate{background:#FFF3D6; color:#8A5A00;}
.status-monitoring{background:#EDEEF1; color:#5B6068;}
.status-future{background:#EFEAFB; color:#5C3FA0;}
.status-unscheduled{background:#F3F3F4; color:#7A7F87;}

/* ---------- Modal edit-dates button ---------- */
.editdates{
  margin-top:16px;
  width:100%;
  border:none;
  background:var(--navy);
  color:#fff;
  font-weight:700;
  font-size:13px;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-family:inherit;
}
.editdates:hover{background:var(--navy-light);}
.sidebar-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:14px;
}
.sidebar-card h3{
  margin:0 0 10px;
  font-size:12.5px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--muted);
}
.side-item{
  display:flex;
  gap:8px;
  align-items:flex-start;
  padding:6px 0;
  border-bottom:1px solid #F3F4F6;
  cursor:pointer;
  font-size:12.5px;
}
.side-item:last-child{border-bottom:none;}
.side-item .dot{
  width:9px;height:9px;border-radius:50%;margin-top:3px;flex-shrink:0;
}
.side-empty{color:var(--muted); font-size:12.5px; padding:6px 0;}

/* ---------- Detail modal ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(20,24,38,.45);
  display:none; align-items:center; justify-content:center; z-index:50;
  padding:20px;
}
.overlay.show{display:flex;}
.modal{
  background:#fff;
  border-radius:14px;
  max-width:480px;
  width:100%;
  padding:22px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.modal .cattag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  margin-bottom:10px;
}
.modal h2{
  margin:0 0 12px;
  font-size:18px;
  color:var(--navy);
}
.modal .row{
  margin-bottom:10px;
}
.modal .row .k{
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--muted);
  font-weight:700;
  margin-bottom:2px;
}
.modal .row .v{
  font-size:13px;
  color:var(--text);
}
.modal .flag{
  display:inline-block;
  margin-top:2px;
  font-size:11.5px;
  font-weight:700;
  color:#8a5a00;
  background:#FFF3D6;
  padding:3px 9px;
  border-radius:6px;
}
.modal .close{
  float:right;
  border:none;
  background:#F0F1F4;
  width:28px;height:28px;
  border-radius:50%;
  font-size:15px;
  cursor:pointer;
  color:var(--muted);
}
.legend-note{
  margin-top:14px;
  font-size:11.5px;
  color:var(--muted);
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  align-items:center;
}
.legend-note .swatch{
  display:inline-flex; align-items:center; gap:5px;
}
.legend-note .sw{
  width:16px;height:9px;border-radius:2px;display:inline-block;
}
.legend-note .sw.hatch{
  background-image:repeating-linear-gradient(45deg,#999 0 3px,#FFE066 3px 6px);
}
.legend-note .sw.hatch2{
  background-image:repeating-linear-gradient(45deg,#C7CAD1 0 3px,#E4E6EA 3px 6px);
}
@media (max-width:860px){
  .cal-layout{grid-template-columns:1fr;}
}
</style>
</head>

<script>/* ============ Constants ============ */
const RAW = JSON.parse(document.getElementById('data').textContent);
const MONTH_ABBR = ['Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_NUM  = [6,7,8,9,10,11,12];
const MONTH_FULL = ['June','July','August','September','October','November','December'];
const MONTH_DAYS = [30,31,31,30,31,30,31];
const YEAR = 2026;
const TODAY = new Date(2026,6,8); // July 8, 2026
const CURRENT_MONTH_IDX = 1; // July
const AXIS_START = new Date(YEAR,5,1);
const AXIS_END = new Date(YEAR,11,31);
const STORAGE_KEY = 'vasa_date_overrides';

const CATEGORY_COLORS = {
  'Leadership & Strategic': '#4472C4',
  'Launches': '#2E86AB',
  'Pilots': '#70AD47',
  'Training': '#3FA796',
  'Club Promos': '#ED7D31',
  'New Club Openings': '#7030A0',
  'Remodels': '#C99A00',
  '2027+ Pipeline': '#8E7CC3',
  'Personal Training': '#375623',
  'Group Fitness': '#0B8FC7',
  'STUDIO': '#C00000',
  'TBD / Unscheduled': '#7A7F87'
};
const CATEGORY_ORDER = Object.keys(CATEGORY_COLORS);
const STATUS_LABELS = {
  scheduled:'Scheduled', needsdate:'Needs a date', monitoring:'Monitoring',
  future:'2027+', unscheduled:'Unscheduled'
};
const REGION_LABELS = {all:'All Regions', '1':'Region 1', '2':'Region 2', '3':'Region 3'};

/* ============ Date helpers ============ */
function pad2(n){ return n<10 ? '0'+n : ''+n; }
function toISO(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function fromISO(s){ if(!s) return null; const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }
const TOTAL_AXIS_DAYS = daysBetween(AXIS_START, AXIS_END) + 1;

/* ============ Parse regions ============ */
function parseRegions(audience){
  if(!audience) return ['all'];
  const matches = [...audience.matchAll(/Region\s*([123])/gi)].map(m=>m[1]);
  if(matches.length) return [...new Set(matches)];
  if(/\ball\b/i.test(audience)) return ['all'];
  return ['other'];
}

/* ============ Day-in-month text parsing (used only to seed default dates) ============ */
function weekRangeForMonth(week, daysInMonth){
  const w = parseInt(week,10);
  if(w===1) return [1,7];
  if(w===2) return [8,14];
  if(w===3) return [15,21];
  return [22, daysInMonth];
}
function findDayRange(text, monthIdx){
  if(!text) return null;
  const monthNum = MONTH_NUM[monthIdx];
  const daysInMonth = MONTH_DAYS[monthIdx];
  const fullName = MONTH_FULL[monthIdx];
  const abbr = MONTH_ABBR[monthIdx];

  let re = new RegExp('\\b'+monthNum+'\\/(\\d{1,2})\\s*-\\s*(?:'+monthNum+'\\/)?(\\d{1,2})\\b');
  let m = text.match(re);
  if(m) return [parseInt(m[1]), parseInt(m[2])];

  let re2 = new RegExp('\\b'+monthNum+'\\/(\\d{1,2})\\b','g');
  let nums = [...text.matchAll(re2)].map(x=>parseInt(x[1])).filter(d=>d>=1 && d<=daysInMonth);
  if(nums.length) return [Math.min(...nums), Math.max(...nums)];

  let re3 = new RegExp('(?:'+fullName+'|'+abbr+')\\.?\\s+(\\d{1,2})(?:\\s*-\\s*(\\d{1,2}))?','i');
  let m3 = text.match(re3);
  if(m3) return [parseInt(m3[1]), m3[2]?parseInt(m3[2]):parseInt(m3[1])];

  let re4 = new RegExp('WK([1-4])\\s*(?:&\\s*WK([1-4])\\s*)?(?:'+fullName+'|'+abbr+')?','i');
  let re5 = new RegExp('(?:'+fullName+'|'+abbr+').{0,15}?WK([1-4])','i');
  let m4 = text.match(re4) || text.match(re5);
  if(m4 && (new RegExp(fullName+'|'+abbr,'i').test(text))){
    return weekRangeForMonth(m4[1], daysInMonth);
  }

  if(/end of/i.test(text)) return weekRangeForMonth(4, daysInMonth);
  if(/(beginning of|early)/i.test(text)) return weekRangeForMonth(1, daysInMonth);
  if(/mid[\s-]/i.test(text)) return [Math.round(daysInMonth*0.45), Math.round(daysInMonth*0.55)];

  return null;
}

/* ============ Build items ============ */
function buildItems(raw){
  return raw.map(it=>{
    const fills = it.fills;
    const monthsActive = fills.map(f=>!!f);
    const hasYellow = fills.some(f=> f && f.toLowerCase()==='#ffff00');
    const isMonitoring = it.sheet === 'TBD - Monitor';
    const anyFill = fills.some(f=>f);
    let status = 'scheduled';
    if(isMonitoring) status = 'monitoring';
    else if(hasYellow) status = 'needsdate';
    else if(!anyFill) status = it.category === '2027+ Pipeline' ? 'future' : 'unscheduled';

    let defaultStart=null, defaultEnd=null;
    if(status==='scheduled' || status==='needsdate'){
      const activeIdx = monthsActive.map((v,i)=>v?i:-1).filter(i=>i>=0);
      if(activeIdx.length){
        const firstIdx = activeIdx[0], lastIdx = activeIdx[activeIdx.length-1];
        const sRange = findDayRange(it.timing, firstIdx);
        const sDay = sRange ? sRange[0] : 1;
        const eRange = findDayRange(it.timing, lastIdx);
        const eDay = eRange ? eRange[1] : MONTH_DAYS[lastIdx];
        defaultStart = toISO(new Date(YEAR, MONTH_NUM[firstIdx]-1, sDay));
        defaultEnd = toISO(new Date(YEAR, MONTH_NUM[lastIdx]-1, eDay));
      }
    }

    return {
      ...it,
      regions: parseRegions(it.audience),
      monthsActive, status,
      defaultStart, defaultEnd,
      color: CATEGORY_COLORS[it.category] || '#666'
    };
  });
}
const ITEMS = buildItems(RAW);

/* ============ Overrides (persisted edits) ============ */
let overrides = {};

async function loadOverrides(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value) overrides = JSON.parse(res.value);
  }catch(e){ overrides = {}; }
}
async function saveOverrides(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(overrides), false); }
  catch(e){ console.warn('Could not save date edits', e); }
}
function setOverride(id, field, value){
  const key = String(id);
  overrides[key] = overrides[key] || {};
  overrides[key][field] = value || null;
  saveOverrides();
}
function clearOverride(id){
  delete overrides[String(id)];
  saveOverrides();
}
function getEffective(item){
  const o = overrides[String(item.id)] || {};
  const start = (o.start !== undefined && o.start !== null) ? o.start : item.defaultStart;
  const end = (o.end !== undefined && o.end !== null) ? o.end : item.defaultEnd;
  return {start, end};
}
function isOverridden(item){
  const o = overrides[String(item.id)];
  return !!(o && (o.start || o.end));
}
function getEffectiveStatus(item, eff){
  if(isOverridden(item) && eff.start && eff.end) return 'scheduled';
  return item.status;
}

/* ============ State ============ */
const state = {
  view: 'gantt',
  region: 'all',
  categories: new Set(CATEGORY_ORDER),
  calMonth: CURRENT_MONTH_IDX,
  collapsed: new Set()
};

/* ============ Filtering ============ */
function passesFilter(item){
  if(!state.categories.has(item.category)) return false;
  if(state.region !== 'all'){
    if(!(item.regions.includes(state.region) || item.regions.includes('all'))) return false;
  }
  return true;
}

/* ============ Rendering: shell ============ */
const app = document.getElementById('app');

function render(){
  app.innerHTML = `
    ${renderHeader()}
    ${renderFilterBar()}
    <div id="viewport"></div>
  `;
  const vp = document.getElementById('viewport');
  if(state.view==='gantt') vp.innerHTML = renderGanttHTML();
  else if(state.view==='calendar') vp.innerHTML = renderCalendarHTML();
  else vp.innerHTML = renderDatesHTML();

  attachHeaderEvents();
  attachFilterEvents();
  if(state.view==='gantt') attachGanttEvents();
  else if(state.view==='calendar') attachCalendarEvents();
  else attachDatesEvents();
}

function renderHeader(){
  return `
  <div class="header">
    <div>
      <h1>VASA Operations Timeline</h1>
      <div class="sub">Leadership initiatives, launches, pilots, promos, new clubs &amp; team workstreams &middot; data current as of July 1, 2026</div>
    </div>
    <div class="view-toggle">
      <button data-view="gantt" class="${state.view==='gantt'?'active':''}">Gantt</button>
      <button data-view="calendar" class="${state.view==='calendar'?'active':''}">Calendar</button>
      <button data-view="dates" class="${state.view==='dates'?'active':''}">Dates</button>
    </div>
  </div>`;
}

function attachHeaderEvents(){
  app.querySelectorAll('.view-toggle button').forEach(b=>{
    b.onclick = ()=>{ state.view = b.dataset.view; render(); };
  });
}

function renderFilterBar(){
  const regionPills = ['all','1','2','3'].map(r=>
    `<button class="pill ${state.region===r?'active':''}" data-region="${r}">${REGION_LABELS[r]}</button>`
  ).join('');
  const chips = CATEGORY_ORDER.map(cat=>{
    const on = state.categories.has(cat);
    const color = CATEGORY_COLORS[cat];
    return `<button class="chip ${on?'':'off'}" data-cat="${escapeAttr(cat)}">
      <span class="dot" style="background:${color}"></span>${cat}
    </button>`;
  }).join('');
  return `
  <div class="filterbar">
    <div class="filter-row">
      <div class="filter-label">Region</div>
      ${regionPills}
    </div>
    <div class="filter-row">
      <div class="filter-label">Category</div>
      ${chips}
      <div class="filter-actions">
        <button class="linklike" id="allcats">All</button>
        <button class="linklike" id="nonecats">None</button>
      </div>
    </div>
  </div>`;
}

function attachFilterEvents(){
  app.querySelectorAll('[data-region]').forEach(b=>{
    b.onclick = ()=>{ state.region = b.dataset.region; render(); };
  });
  app.querySelectorAll('[data-cat]').forEach(b=>{
    b.onclick = ()=>{
      const cat = b.dataset.cat;
      if(state.categories.has(cat)) state.categories.delete(cat); else state.categories.add(cat);
      render();
    };
  });
  const allBtn = document.getElementById('allcats');
  const noneBtn = document.getElementById('nonecats');
  if(allBtn) allBtn.onclick = ()=>{ state.categories = new Set(CATEGORY_ORDER); render(); };
  if(noneBtn) noneBtn.onclick = ()=>{ state.categories = new Set(); render(); };
}

function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }
function escapeHtml(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ============ Gantt view (continuous, date-based) ============ */
function renderGanttHTML(){
  const visible = ITEMS.filter(passesFilter);
  if(!visible.length){
    return `<div class="gantt-wrap"><div class="gantt-empty">No initiatives match the current filters.</div></div>`;
  }
  const byCat = {};
  CATEGORY_ORDER.forEach(c=>byCat[c]=[]);
  visible.forEach(it=>byCat[it.category].push(it));

  let head = `<div class="gantt-head">
    <div class="hcell">Initiative</div>
    ${MONTH_ABBR.map((m,i)=>`<div class="hcell ${i===CURRENT_MONTH_IDX?'current':''}">${m} '26</div>`).join('')}
  </div>`;

  let body = '';
  CATEGORY_ORDER.forEach(cat=>{
    const rows = byCat[cat];
    if(!rows.length) return;
    const collapsed = state.collapsed.has(cat);
    body += `<div class="cat-group-header ${collapsed?'collapsed':''}" data-catgroup="${escapeAttr(cat)}">
      <div class="catcell">
        <span class="catdot" style="background:${CATEGORY_COLORS[cat]}"></span>
        ${cat} <span class="count">(${rows.length})</span>
        <span class="chev">&#9660;</span>
      </div>
    </div>`;
    if(!collapsed){
      rows.forEach(it=>{ body += ganttRowHTML(it); });
    }
  });

  return `
  <div class="gantt-wrap">
    <div class="gantt-scroll">
      <div class="gantt-grid">
        ${head}
        ${body}
      </div>
    </div>
  </div>
  <div class="legend-note">
    <span class="swatch"><span class="sw hatch"></span> needs a confirmed date</span>
    <span class="swatch"><span class="sw hatch2"></span> being monitored — no committed timeline</span>
    <span>Bars use each initiative's start/end date — edit them in the <b>Dates</b> tab.</span>
  </div>`;
}

function ganttRowHTML(it){
  const monthCells = MONTH_ABBR.map((m,i)=>`<div class="monthcell ${i===CURRENT_MONTH_IDX?'current':''}"></div>`).join('');
  const eff = getEffective(it);
  const effStatus = getEffectiveStatus(it, eff);
  let bar = '';
  if(eff.start && eff.end){
    const s = fromISO(eff.start), e = fromISO(eff.end);
    const clampedS = s < AXIS_START ? AXIS_START : s;
    const clampedE = e > AXIS_END ? AXIS_END : e;
    if(clampedS <= clampedE){
      const leftPct = daysBetween(AXIS_START, clampedS)/TOTAL_AXIS_DAYS*100;
      const widthPct = (daysBetween(clampedS, clampedE)+1)/TOTAL_AXIS_DAYS*100;
      let cls = 'bar';
      let style = `left:calc(${leftPct}% + 3px);width:calc(${widthPct}% - 6px);`;
      if(effStatus==='needsdate'){ cls+=' needsdate'; style+=`--bc:${it.color};`; }
      else if(effStatus==='monitoring'){ cls+=' monitoring'; }
      else style += `background:${it.color};`;
      bar = `<div class="${cls}" style="${style}" data-id="${it.id}" title="${escapeAttr(it.activity)}"></div>`;
    }
  }
  return `
  <div class="gantt-row">
    <div class="label" data-id="${it.id}">
      <div class="name">${escapeHtml(it.activity)}</div>
      <div class="meta">${escapeHtml(it.owner||it.audience||'')}</div>
    </div>
    <div class="gantt-track">
      ${monthCells}
      ${bar}
    </div>
  </div>`;
}

function attachGanttEvents(){
  app.querySelectorAll('[data-catgroup]').forEach(el=>{
    el.onclick = ()=>{
      const cat = el.dataset.catgroup;
      if(state.collapsed.has(cat)) state.collapsed.delete(cat); else state.collapsed.add(cat);
      render();
    };
  });
  app.querySelectorAll('.bar, .label').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const id = parseInt(el.dataset.id);
      openModal(id);
    };
  });
}

/* ============ Calendar view ============ */
function firstWeekdayOfMonth(monthIdx){
  return new Date(YEAR, MONTH_NUM[monthIdx]-1, 1).getDay();
}

const MAXLANES = 4;
const HEADER_H = 20;
const LANE_H = 21;
const OVERFLOW_H = 16;

function computeWeeks(startDow, daysInMonth){
  const weeks = [];
  let day = 1 - startDow;
  while(day <= daysInMonth){
    const row = [];
    for(let i=0;i<7;i++){ row.push(day>=1 && day<=daysInMonth ? day : null); day++; }
    weeks.push(row);
  }
  return weeks;
}

function renderCalendarHTML(){
  const visible = ITEMS.filter(passesFilter);
  const monthIdx = state.calMonth;
  const daysInMonth = MONTH_DAYS[monthIdx];
  const startDow = firstWeekdayOfMonth(monthIdx);
  const weeks = computeWeeks(startDow, daysInMonth);
  const monthStart = new Date(YEAR, MONTH_NUM[monthIdx]-1, 1);
  const monthEnd = new Date(YEAR, MONTH_NUM[monthIdx]-1, daysInMonth);

  const monitoringList = [];
  const monthItems = [];

  visible.forEach(it=>{
    const eff = getEffective(it);
    const effStatus = getEffectiveStatus(it, eff);
    if(eff.start && eff.end){
      const s = fromISO(eff.start), e = fromISO(eff.end);
      if(s<=monthEnd && e>=monthStart){
        monthItems.push({...it, effStatus, start:s, end:e});
      }
      return;
    }
    if(it.status==='monitoring' && it.monthsActive[monthIdx]) monitoringList.push(it);
  });

  const tabs = MONTH_ABBR.map((m,i)=>{
    const hasCur = i===CURRENT_MONTH_IDX;
    return `<button class="${state.calMonth===i?'active':''} ${hasCur?'hascurrent':''}" data-month="${i}">${m} '26</button>`;
  }).join('');

  const laneOf = {};
  let weeksHTML = '';
  weeks.forEach(row=>{
    const daysInRow = row.filter(d=>d!==null);
    const rowStart = daysInRow.length ? daysInRow[0] : null;
    const rowEnd = daysInRow.length ? daysInRow[daysInRow.length-1] : null;

    let segments = [];
    const overflow = [];
    if(rowStart!==null){
      const rowStartDate = new Date(YEAR, MONTH_NUM[monthIdx]-1, rowStart);
      const rowEndDate = new Date(YEAR, MONTH_NUM[monthIdx]-1, rowEnd);
      let active = monthItems.filter(it=> it.start<=rowEndDate && it.end>=rowStartDate);
      active.sort((a,b)=> a.start-b.start || (b.end-b.start)-(a.end-a.start));
      const occupied = {};
      active.forEach(it=>{
        const sDay = it.start < rowStartDate ? rowStart : it.start.getDate();
        const eDay = it.end > rowEndDate ? rowEnd : it.end.getDate();
        const colStart = row.indexOf(sDay), colEnd = row.indexOf(eDay);
        let lane = laneOf[it.id];
        const free = l => !(occupied[l]!==undefined && occupied[l] >= colStart);
        if(lane===undefined || !free(lane)){
          lane = 0;
          while(occupied[lane]!==undefined && occupied[lane] >= colStart) lane++;
        }
        if(lane >= MAXLANES){ overflow.push(it); return; }
        laneOf[it.id] = lane;
        occupied[lane] = colEnd;
        segments.push({it, colStart, colEnd, lane});
      });
    }

    const dayCells = row.map(d=>{
      const isToday = (monthIdx===CURRENT_MONTH_IDX && d===TODAY.getDate());
      if(d===null) return `<div class="cal-cell pad"></div>`;
      return `<div class="cal-cell ${isToday?'today':''}"><div class="daynum">${d}</div></div>`;
    }).join('');

    const bars = segments.map(seg=>{
      const left = (seg.colStart/7*100);
      const width = ((seg.colEnd-seg.colStart+1)/7*100);
      const top = HEADER_H + seg.lane*LANE_H;
      let style = `left:calc(${left}% + 2px);width:calc(${width}% - 4px);top:${top}px;`;
      let cls = 'evt-bar';
      if(seg.it.effStatus==='needsdate'){ cls+=' needsdate'; style+=`--bc:${seg.it.color};`; }
      else if(seg.it.effStatus==='monitoring'){ cls+=' monitoring2'; }
      else style += `background:${seg.it.color};`;
      return `<div class="${cls}" style="${style}" data-id="${seg.it.id}" title="${escapeAttr(seg.it.activity)}">${escapeHtml(seg.it.activity)}</div>`;
    }).join('');

    const overflowHTML = overflow.length ? `<div class="evt-overflow" style="top:${HEADER_H+MAXLANES*LANE_H}px" title="${escapeAttr(overflow.map(o=>o.activity).join(', '))}">+${overflow.length} more</div>` : '';

    const rowMinH = HEADER_H + MAXLANES*LANE_H + (overflow.length?OVERFLOW_H:6);
    weeksHTML += `<div class="cal-week" style="min-height:${rowMinH}px">
        ${dayCells}
        <div class="bar-layer">${bars}${overflowHTML}</div>
      </div>`;
  });

  const weekdayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const monitorHTML = `
    <div class="sidebar-card">
      <h3>Being monitored — no date</h3>
      ${monitoringList.length ? monitoringList.map(it=>`<div class="side-item" data-id="${it.id}"><span class="dot" style="background:#9AA0AA"></span><span>${escapeHtml(it.activity)}</span></div>`).join('') : '<div class="side-empty">Nothing to monitor this month.</div>'}
      <div class="side-hint">Give any of these a start/end date in the <b>Dates</b> tab to put them on the calendar.</div>
    </div>`;

  return `
  <div class="month-tabs">${tabs}</div>
  <div class="cal-layout">
    <div class="cal-card">
      <div class="cal-weekdays">${weekdayNames.map(w=>`<div>${w}</div>`).join('')}</div>
      <div class="cal-grid">${weeksHTML}</div>
    </div>
    <div class="cal-sidebar">
      ${monitorHTML}
    </div>
  </div>`;
}

function attachCalendarEvents(){
  app.querySelectorAll('[data-month]').forEach(b=>{
    b.onclick = ()=>{ state.calMonth = parseInt(b.dataset.month); render(); };
  });
  app.querySelectorAll('.evt-bar[data-id], .side-item[data-id]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      openModal(parseInt(el.dataset.id));
    };
  });
}

/* ============ Dates (editable table) view ============ */
function renderDatesHTML(){
  const visible = ITEMS.filter(passesFilter).slice().sort((a,b)=>{
    const ea = getEffective(a), eb = getEffective(b);
    if(ea.start && !eb.start) return -1;
    if(!ea.start && eb.start) return 1;
    if(ea.start && eb.start && ea.start !== eb.start) return ea.start < eb.start ? -1 : 1;
    return a.activity.localeCompare(b.activity);
  });

  const rows = visible.map(it=>{
    const eff = getEffective(it);
    const effStatus = getEffectiveStatus(it, eff);
    const overridden = isOverridden(it);
    return `
    <tr data-row="${it.id}">
      <td><span class="tdot" style="background:${it.color}"></span></td>
      <td class="tdactivity">
        <div class="tdname">${escapeHtml(it.activity)}</div>
        <div class="tdmeta">${escapeHtml(it.category)}${it.owner ? ' &middot; '+escapeHtml(it.owner) : ''}</div>
      </td>
      <td><input type="date" class="dateinput" data-id="${it.id}" data-field="start" value="${eff.start||''}" min="2026-01-01" max="2027-12-31"></td>
      <td><input type="date" class="dateinput" data-id="${it.id}" data-field="end" value="${eff.end||''}" min="2026-01-01" max="2027-12-31"></td>
      <td><span class="statuspill status-${effStatus}">${STATUS_LABELS[effStatus]}</span></td>
      <td>${overridden ? `<button class="linklike" data-reset="${it.id}">Reset</button>` : ''}</td>
    </tr>`;
  }).join('');

  return `
  <div class="dates-wrap">
    <div class="dates-toolbar">
      <div class="dates-count">${visible.length} initiative${visible.length===1?'':'s'} &middot; edits save automatically</div>
      <button class="linklike" id="resetall">Reset all edits</button>
    </div>
    <div class="dates-scroll">
      <table class="dates-table">
        <thead>
          <tr>
            <th></th>
            <th>Initiative</th>
            <th>Start date</th>
            <th>End date</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function attachDatesEvents(){
  app.querySelectorAll('.dateinput').forEach(inp=>{
    inp.onchange = ()=>{
      const id = parseInt(inp.dataset.id);
      const field = inp.dataset.field;
      const item = ITEMS.find(x=>x.id===id);
      setOverride(id, field, inp.value);
      const eff = getEffective(item);
      if(eff.start && eff.end && fromISO(eff.start) > fromISO(eff.end)){
        setOverride(id, field==='start' ? 'end' : 'start', inp.value);
      }
      render();
    };
  });
  app.querySelectorAll('[data-reset]').forEach(btn=>{
    btn.onclick = ()=>{
      clearOverride(parseInt(btn.dataset.reset));
      render();
    };
  });
  const resetAll = document.getElementById('resetall');
  if(resetAll) resetAll.onclick = ()=>{
    overrides = {};
    saveOverrides();
    render();
  };
}

/* ============ Modal ============ */
function openModal(id){
  const it = ITEMS.find(x=>x.id===id);
  if(!it) return;
  const eff = getEffective(it);
  const effStatus = getEffectiveStatus(it, eff);
  const overlay = document.getElementById('overlay');
  const modal = document.getElementById('modal');
  let flag = '';
  if(effStatus==='needsdate') flag = `<div class="flag">&#9888; Date not yet confirmed</div>`;
  if(effStatus==='monitoring') flag = `<div class="flag">&#128065; Being monitored — no committed timeline</div>`;
  const dateLine = eff.start ? (eff.start + (eff.end && eff.end!==eff.start ? ' \u2192 '+eff.end : '')) : 'Not set';
  modal.innerHTML = `
    <button class="close" id="modalclose">&times;</button>
    <div class="cattag" style="background:${it.color}">${escapeHtml(it.category)}</div>
    <h2>${escapeHtml(it.activity)}</h2>
    <div class="row"><div class="k">Dates</div><div class="v">${dateLine}</div></div>
    <div class="row"><div class="k">Timing (source text)</div><div class="v">${escapeHtml(it.timing||'TBD')}</div></div>
    <div class="row"><div class="k">Owner</div><div class="v">${escapeHtml(it.owner||'—')}</div></div>
    <div class="row"><div class="k">Audience / view</div><div class="v">${escapeHtml(it.audience||'—')}</div></div>
    <div class="row"><div class="k">Source</div><div class="v">${escapeHtml(it.source||'—')}</div></div>
    ${flag}
    <button class="editdates" id="editdatesbtn">Edit dates &rarr;</button>
  `;
  overlay.classList.add('show');
  document.getElementById('modalclose').onclick = closeModal;
  document.getElementById('editdatesbtn').onclick = ()=>{
    closeModal();
    state.view = 'dates';
    render();
    setTimeout(()=>{
      const row = app.querySelector('tr[data-row="'+id+'"]');
      if(row){
        row.scrollIntoView({block:'center', behavior:'smooth'});
        row.classList.add('flash');
        setTimeout(()=>row.classList.remove('flash'), 1600);
      }
    }, 50);
  };
  overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
}

/* ============ Init ============ */
(async function init(){
  await loadOverrides();
  render();
})();
</script>
